<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[#f8fafc]">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xs p-8 border border-gray-100 flex flex-col">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl mx-auto mb-3">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Chào mừng trở lại</h2>
            <p class="text-sm text-gray-400 mt-1">Vui lòng đăng nhập tài khoản quản trị</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMessage" class="hidden p-3 text-xs font-medium text-red-600 bg-red-50 rounded-lg border border-red-100">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> <span id="errorText">Tài khoản hoặc mật khẩu không đúng</span>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-gray-700">Tên đăng nhập</label>
                <div class="relative focus-within:text-blue-500 text-gray-400">
                    <span class="absolute inset-y-0 left-3 flex items-center">
                        <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input type="text" id="username" required placeholder="Nhập username" 
                           class="w-full border border-gray-200 rounded-lg pl-9 pr-3 py-2 text-sm text-gray-700 outline-hidden focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-700">Mật khẩu</label>
                    <a href="#" class="text-[11px] font-medium text-blue-600 hover:underline">Quên mật khẩu?</a>
                </div>
                <div class="relative focus-within:text-blue-500 text-gray-400">
                    <span class="absolute inset-y-0 left-3 flex items-center">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full border border-gray-200 rounded-lg pl-9 pr-3 py-2 text-sm text-gray-700 outline-hidden focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded-sm border-gray-300 text-blue-600 focus:ring-blue-500">
                <label for="remember" class="ml-2 text-xs font-medium text-gray-500 cursor-pointer select-none">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-2.5 rounded-lg transition shadow-xs cursor-pointer flex items-center justify-center space-x-2">
                <span>Đăng nhập</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-gray-100">
            <p class="text-xs text-gray-500">
                Chưa có tài khoản? 
                <a href="/register" class="text-blue-600 font-bold hover:underline">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script>
        // 1. Khi trang vừa tải xong, kiểm tra xem có username nào được lưu trước đó không
        document.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem('remembered_username');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('remember').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.add('hidden');

            const usernameInput = document.getElementById('username').value;
            const isRememberMe = document.getElementById('remember').checked;

            // Định dạng form-data chuẩn để FastAPI OAuth2 tiếp nhận
            const formData = new FormData();
            formData.append('username', usernameInput);
            formData.append('password', document.getElementById('password').value);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 2. Xử lý logic Ghi nhớ đăng nhập dựa trên Checkbox
                    if (isRememberMe) {
                        // Lưu Token lâu dài và lưu lại tên đăng nhập
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('remembered_username', usernameInput);
                    } else {
                        // Lưu Token tạm thời trong phiên làm việc, xóa lịch sử lưu username cũ nếu có
                        sessionStorage.setItem('access_token', data.access_token);
                        localStorage.removeItem('access_token'); // Xóa token cũ ở localStorage nếu tồn tại
                        localStorage.removeItem('remembered_username');
                    }

                    // Chuyển hướng sang trang quản trị chính
                    window.location.href = '/';
                } else {
                    document.getElementById('errorText').innerText = data.detail || 'Tài khoản hoặc mật khẩu không đúng';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('errorText').innerText = 'Lỗi kết nối đến máy chủ';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
