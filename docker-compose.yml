version: '3.8'

services:
  # --- DỊCH VỤ POSTGRESQL (Lưu thông tin tài khoản vĩnh viễn) ---
  postgres_db:
    image: postgres:15-alpine
    container_name: fastapi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: htland
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d htland"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- DỊCH VỤ REDIS (Lưu phiên đăng xuất / Blacklist Token) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Bật chế độ AOF để ghi dữ liệu từ RAM xuống đĩa liên tục
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium_chrome
    ports:
      - "4444:4444" # Cổng để code Python gửi lệnh điều khiển tự động
      - "7900:7900" # Cổng để BẠN mở trình duyệt lên coi màn hình và đăng nhập
    shm_size: 2gb    # Rất quan trọng: Cấp đủ bộ nhớ đệm cho Chrome không bị sụp
    environment:
      - VNC_PASSWORD=admin  # <--- THÊM DÒNG NÀY ĐỂ ĐẶT MẬT KHẨU

  worker:
    build: .
    container_name: rq_worker
    working_dir: /app
    volumes:
      - .:/app
      - worker_data:/data
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - SELENIUM_REMOTE_URL=http://chrome:4444/wd/hub # Khai báo đường dẫn kết nối tới container chrome

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  worker_data: